{% extends 'base.html' %}
{% block title %}Nouvelle séance — Écodim{% endblock %}
{% block page_title %}Nouvelle Séance{% endblock %}

{% block content %}
<div style="max-width:480px;">
    <div class="page-header">
        <div>
            <h1>Nouvelle séance</h1>
            <p>Créer une feuille de présence</p>
        </div>
        <a href="{% url 'presences_list' %}" class="btn btn-outline">
            <i class="fas fa-arrow-left"></i> Retour
        </a>
    </div>

    <div class="card">
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Date du dimanche *</label>
                <input type="date" name="date" class="form-control" required>
            </div>
            <div style="display:flex; gap:12px; justify-content:flex-end;">
                <a href="{% url 'presences_list' %}" class="btn btn-outline">Annuler</a>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Créer la séance
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
